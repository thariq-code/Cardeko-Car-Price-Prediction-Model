<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 50%;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 22px;
            color: blue;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Car Price Prediction</h1>

    <form action="/predict" method="POST">

        <label>Vehicle Age</label>
        <input type="number" name="vehicle_age" required>

        <label>Kilometers Driven</label>
        <input type="number" name="km_driven" required>

        <label>Mileage (kmpl)</label>
        <input type="number" step="0.01" name="mileage" required>

        <label>Engine (CC)</label>
        <input type="number" name="engine" required>

        <label>Max Power (BHP)</label>
        <input type="number" step="0.01" name="max_power" required>

        <label>Seats</label>
        <input type="number" name="seats" required>

        <label>Seller Type</label>
        <select name="seller_type" required>
            <option value="Dealer">Dealer</option>
            <option value="Individual">Individual</option>
            <option value="Trustmark Dealer">Trustmark Dealer</option>
        </select>

        <label>Fuel Type</label>
        <select name="fuel_type" required>
            <option value="Petrol">Petrol</option>
            <option value="Diesel">Diesel</option>
            <option value="CNG">CNG</option>
            <option value="LPG">LPG</option>
            <option value="Electric">Electric</option>
        </select>

        <label>Transmission Type</label>
        <select name="transmission_type" required>
            <option value="Manual">Manual</option>
            <option value="Automatic">Automatic</option>
        </select>

        <button type="submit">Predict Price</button>

    </form>

    {% if prediction_text %}
    <div class="result">
        {{ prediction_text }}
    </div>
    {% endif %}

</div>

</body>
</html>
